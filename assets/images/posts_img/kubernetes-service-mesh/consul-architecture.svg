<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="380" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="340" y="32" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Consul Connect Architecture</text>

  <!-- Outer Mesh Box -->
  <rect x="20" y="48" width="640" height="290" rx="10" fill="#e76f51" opacity="0.06" stroke="#e76f51" stroke-width="1.5"/>
  <text x="340" y="72" text-anchor="middle" fill="#e9a98a" font-size="13" font-weight="bold">Consul Service Mesh</text>

  <!-- Kubernetes Zone -->
  <rect x="40" y="85" width="280" height="175" rx="8" fill="#264653" opacity="0.25" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="180" y="108" text-anchor="middle" fill="#76c7b7" font-size="13" font-weight="bold">Kubernetes</text>

  <!-- K8s Pod -->
  <rect x="65" y="120" width="105" height="55" rx="6" fill="#2a2a4a" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="117" y="142" text-anchor="middle" fill="#d0d0e0" font-size="12">Pod</text>
  <text x="117" y="162" text-anchor="middle" fill="#8899bb" font-size="10">(App)</text>

  <rect x="190" y="120" width="105" height="55" rx="6" fill="#3a2a4a" stroke="#8a5ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="242" y="142" text-anchor="middle" fill="#d0b0f0" font-size="12">Envoy</text>
  <text x="242" y="162" text-anchor="middle" fill="#8a7aaa" font-size="10">(Sidecar)</text>

  <!-- Arrow between pod and envoy -->
  <line x1="170" y1="147" x2="190" y2="147" stroke="#f5a623" stroke-width="1.5"/>
  <polygon points="186,142 194,147 186,152" fill="#f5a623"/>

  <!-- K8s Pod 2 -->
  <rect x="65" y="190" width="105" height="55" rx="6" fill="#2a2a4a" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="117" y="212" text-anchor="middle" fill="#d0d0e0" font-size="12">Pod</text>
  <text x="117" y="232" text-anchor="middle" fill="#8899bb" font-size="10">(App)</text>

  <rect x="190" y="190" width="105" height="55" rx="6" fill="#3a2a4a" stroke="#8a5ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="242" y="212" text-anchor="middle" fill="#d0b0f0" font-size="12">Envoy</text>
  <text x="242" y="232" text-anchor="middle" fill="#8a7aaa" font-size="10">(Sidecar)</text>

  <line x1="170" y1="217" x2="190" y2="217" stroke="#f5a623" stroke-width="1.5"/>
  <polygon points="186,212 194,217 186,222" fill="#f5a623"/>

  <!-- VM / Bare Metal Zone -->
  <rect x="360" y="85" width="280" height="175" rx="8" fill="#4a3a28" opacity="0.25" stroke="#e9c46a" stroke-width="1.5"/>
  <text x="500" y="108" text-anchor="middle" fill="#e9c46a" font-size="13" font-weight="bold">VM / Bare Metal</text>

  <!-- VM Legacy App -->
  <rect x="385" y="120" width="105" height="55" rx="6" fill="#2a2a4a" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="437" y="142" text-anchor="middle" fill="#d0d0e0" font-size="12">Legacy App</text>
  <text x="437" y="162" text-anchor="middle" fill="#8899bb" font-size="10">(Billing)</text>

  <rect x="510" y="120" width="110" height="55" rx="6" fill="#4a3a2a" stroke="#c09040" stroke-width="1" filter="url(#shadow)"/>
  <text x="565" y="138" text-anchor="middle" fill="#e0c080" font-size="11">Consul Agent</text>
  <text x="565" y="155" text-anchor="middle" fill="#b09060" font-size="10">+</text>
  <text x="565" y="168" text-anchor="middle" fill="#d0b0f0" font-size="11">Envoy</text>

  <line x1="490" y1="147" x2="510" y2="147" stroke="#f5a623" stroke-width="1.5"/>
  <polygon points="506,142 514,147 506,152" fill="#f5a623"/>

  <!-- VM App 2 -->
  <rect x="385" y="190" width="105" height="55" rx="6" fill="#2a2a4a" stroke="#555580" stroke-width="1" filter="url(#shadow)"/>
  <text x="437" y="212" text-anchor="middle" fill="#d0d0e0" font-size="12">Legacy App</text>
  <text x="437" y="232" text-anchor="middle" fill="#8899bb" font-size="10">(Reporting)</text>

  <rect x="510" y="190" width="110" height="55" rx="6" fill="#4a3a2a" stroke="#c09040" stroke-width="1" filter="url(#shadow)"/>
  <text x="565" y="208" text-anchor="middle" fill="#e0c080" font-size="11">Consul Agent</text>
  <text x="565" y="225" text-anchor="middle" fill="#b09060" font-size="10">+</text>
  <text x="565" y="238" text-anchor="middle" fill="#d0b0f0" font-size="11">Envoy</text>

  <line x1="490" y1="217" x2="510" y2="217" stroke="#f5a623" stroke-width="1.5"/>
  <polygon points="506,212 514,217 506,222" fill="#f5a623"/>

  <!-- Consul Server -->
  <rect x="210" y="295" width="260" height="50" rx="8" fill="#5a2a2a" stroke="#e76f51" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="318" text-anchor="middle" fill="#e9a98a" font-size="14" font-weight="bold">Consul Server</text>
  <text x="340" y="336" text-anchor="middle" fill="#b08070" font-size="11">Service Registry + Config + mTLS CA</text>

  <!-- Lines from K8s to Consul Server -->
  <line x1="180" y1="260" x2="280" y2="295" stroke="#2a9d8f" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Lines from VM to Consul Server -->
  <line x1="500" y1="260" x2="400" y2="295" stroke="#e9c46a" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Cross-zone arrow -->
  <line x1="295" y1="147" x2="385" y2="147" stroke="#e76f51" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="381,142 391,147 381,152" fill="#e76f51"/>
  <text x="340" y="140" text-anchor="middle" fill="#e9a98a" font-size="9">mTLS</text>

  <!-- Legend -->
  <rect x="20" y="358" width="10" height="10" rx="2" fill="#2a9d8f"/>
  <text x="36" y="368" fill="#76c7b7" font-size="10">Kubernetes</text>
  <rect x="130" y="358" width="10" height="10" rx="2" fill="#e9c46a"/>
  <text x="146" y="368" fill="#e9c46a" font-size="10">VM / Bare Metal</text>
  <rect x="270" y="358" width="10" height="10" rx="2" fill="#e76f51"/>
  <text x="286" y="368" fill="#e9a98a" font-size="10">Cross-platform Mesh</text>
</svg>

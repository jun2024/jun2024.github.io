<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="12" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="bold">Cilium vs Traditional Service Mesh</text>

  <!-- Traditional (Left) -->
  <rect x="20" y="50" width="320" height="300" rx="10" fill="#5a3a3a" opacity="0.12" stroke="#e07070" stroke-width="1.5"/>
  <text x="180" y="75" text-anchor="middle" fill="#e0a0a0" font-size="13" font-weight="bold">Traditional (Istio / Linkerd)</text>

  <!-- Traditional flow boxes -->
  <rect x="60" y="95" width="100" height="36" rx="6" fill="#3a5a8a" stroke="#5a8aba" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="118" text-anchor="middle" fill="#e0e8f0" font-size="12">App</text>

  <line x1="110" y1="131" x2="110" y2="148" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="105,145 110,153 115,145" fill="#e07070"/>

  <rect x="60" y="155" width="100" height="36" rx="6" fill="#5a3a7a" stroke="#8a5ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="178" text-anchor="middle" fill="#e0d0f0" font-size="11">Sidecar Proxy</text>

  <line x1="110" y1="191" x2="110" y2="208" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="105,205 110,213 115,205" fill="#e07070"/>

  <rect x="60" y="215" width="100" height="36" rx="6" fill="#3a3a5a" stroke="#6a6a9a" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="238" text-anchor="middle" fill="#c0c0e0" font-size="12">Kernel</text>

  <line x1="110" y1="251" x2="110" y2="268" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="105,265 110,273 115,265" fill="#e07070"/>

  <rect x="60" y="275" width="100" height="36" rx="6" fill="#2a4a3a" stroke="#4a8a6a" stroke-width="1" filter="url(#shadow)"/>
  <text x="110" y="298" text-anchor="middle" fill="#b0e0c0" font-size="12">Network</text>

  <!-- Right side (response path) -->
  <rect x="200" y="95" width="100" height="36" rx="6" fill="#3a5a8a" stroke="#5a8aba" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="118" text-anchor="middle" fill="#e0e8f0" font-size="12">App</text>

  <line x1="250" y1="131" x2="250" y2="148" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="245,145 250,153 255,145" fill="#e07070"/>

  <rect x="200" y="155" width="100" height="36" rx="6" fill="#5a3a7a" stroke="#8a5ab0" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="178" text-anchor="middle" fill="#e0d0f0" font-size="11">Sidecar Proxy</text>

  <line x1="250" y1="191" x2="250" y2="208" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="245,205 250,213 255,205" fill="#e07070"/>

  <rect x="200" y="215" width="100" height="36" rx="6" fill="#3a3a5a" stroke="#6a6a9a" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="238" text-anchor="middle" fill="#c0c0e0" font-size="12">Kernel</text>

  <line x1="250" y1="251" x2="250" y2="268" stroke="#e07070" stroke-width="1.5"/>
  <polygon points="245,265 250,273 255,265" fill="#e07070"/>

  <!-- Network connects both -->
  <line x1="160" y1="293" x2="200" y2="293" stroke="#e07070" stroke-width="1.5"/>

  <!-- Hop count -->
  <text x="180" y="335" text-anchor="middle" fill="#e0a0a0" font-size="11">6 hops per request</text>

  <!-- Cilium (Right) -->
  <rect x="370" y="50" width="310" height="300" rx="10" fill="#3a5a3a" opacity="0.12" stroke="#70e070" stroke-width="1.5"/>
  <text x="525" y="75" text-anchor="middle" fill="#a0e0a0" font-size="13" font-weight="bold">Cilium (eBPF)</text>

  <!-- Cilium flow boxes -->
  <rect x="400" y="95" width="100" height="36" rx="6" fill="#3a5a8a" stroke="#5a8aba" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="118" text-anchor="middle" fill="#e0e8f0" font-size="12">App</text>

  <line x1="450" y1="131" x2="450" y2="168" stroke="#70e070" stroke-width="1.5"/>
  <polygon points="445,165 450,173 455,165" fill="#70e070"/>

  <rect x="390" y="175" width="120" height="76" rx="6" fill="#2a4a2a" stroke="#50a050" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="200" text-anchor="middle" fill="#a0e0a0" font-size="12" font-weight="bold">Kernel</text>
  <text x="450" y="218" text-anchor="middle" fill="#70b070" font-size="11">(eBPF programs)</text>
  <text x="450" y="236" text-anchor="middle" fill="#609060" font-size="10">L3/L4/L7 processing</text>

  <line x1="450" y1="251" x2="450" y2="268" stroke="#70e070" stroke-width="1.5"/>
  <polygon points="445,265 450,273 455,265" fill="#70e070"/>

  <rect x="400" y="275" width="100" height="36" rx="6" fill="#2a4a3a" stroke="#4a8a6a" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="298" text-anchor="middle" fill="#b0e0c0" font-size="12">Network</text>

  <!-- Right side -->
  <rect x="550" y="95" width="100" height="36" rx="6" fill="#3a5a8a" stroke="#5a8aba" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="118" text-anchor="middle" fill="#e0e8f0" font-size="12">App</text>

  <line x1="600" y1="131" x2="600" y2="168" stroke="#70e070" stroke-width="1.5"/>
  <polygon points="595,165 600,173 605,165" fill="#70e070"/>

  <rect x="540" y="175" width="120" height="76" rx="6" fill="#2a4a2a" stroke="#50a050" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="200" text-anchor="middle" fill="#a0e0a0" font-size="12" font-weight="bold">Kernel</text>
  <text x="600" y="218" text-anchor="middle" fill="#70b070" font-size="11">(eBPF programs)</text>
  <text x="600" y="236" text-anchor="middle" fill="#609060" font-size="10">L3/L4/L7 processing</text>

  <line x1="600" y1="251" x2="600" y2="268" stroke="#70e070" stroke-width="1.5"/>
  <polygon points="595,265 600,273 605,265" fill="#70e070"/>

  <!-- Network connects both -->
  <line x1="500" y1="293" x2="550" y2="293" stroke="#70e070" stroke-width="1.5"/>

  <!-- No sidecar badge -->
  <rect x="462" y="130" width="80" height="22" rx="11" fill="#2a4a2a" stroke="#50a050" stroke-width="1"/>
  <text x="502" y="145" text-anchor="middle" fill="#a0e0a0" font-size="10">No Sidecar!</text>

  <!-- Hop count -->
  <text x="525" y="335" text-anchor="middle" fill="#a0e0a0" font-size="11">4 hops per request</text>
</svg>
